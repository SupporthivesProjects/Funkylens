<style>
    .t2_body_wala_t {
        /* background: red; */
        padding: 0;
        width: 100%;
    }

    .t2_chart-container_t {
        width: 100%;
        margin: auto;
        background: #fff;
        border-radius: 14px;
        overflow-x: auto;
    }

    /* LEGEND */

    .t2_legend_t {
        display: flex;
        justify-content: flex-end;
        gap: 20px;
        margin-bottom: 8px;
        flex-wrap: wrap;
    }

    .t2_legend-item_t {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #0F0F0F;
        font-family: AvantGardeMdITC;
        font-size: 14px;
        font-weight: 400;
    }

    .t2_dot_t {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }

    .t2_dot_t.t2_gray_t {
        background: #E9E9E9;
    }

    .t2_dot_t.t2_green_t {
        background: #47B147;
    }

    /* CHART AREA */

    .t2_chart-layout_t {
        display: flex;
        width: 100%;
    }

    /* LEFT TITLE */

    .t2_y-axis-title_t {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        color: #0F0F0F;
        font-family: AvantGardeMdITC;
        font-size: 14px;
        font-weight: 400;
        margin-right: 49px;
        padding-left: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
    }

    /* CHART */

    .t2_chart-wrapper_t {
        flex: 1;
        position: relative;
        height: 168px;
        padding-left: 20px;
        padding-right: 20px;
    }

    /* GRID */

    .t2_grid-line_t {
        position: absolute;
        left: 0;
        right: 0;
        border-top: 1px solid #eeeeee;
    }

    .t2_y-label_t {
        position: absolute;
        left: -58px;
        top: -10px;
        width: 40px;
        text-align: right;
        color: #667085;
        font-family: AvantGardeMdITC;
        font-size: 14px;
        font-weight: 400;
    }

    /* BARS */

    .t2_bars_t {
        position: absolute;
        bottom: -32px;
        left: 30px;
        right: 10px;
        height: 100%;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
    }

    .t2_month_t {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        min-width: 24px;
    }

    .t2_bar-wrapper_t {
        position: relative;
        width: 100%;
        max-width: 32px;
        height: 168px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
    }

    .t2_bar-gray_t,
    .t2_bar-green_t {
        position: absolute;
        bottom: 0;
        width: 100%;
        border-radius: 8px 8px 0 0;
        transition: 0.3s;
    }

    .t2_bar-gray_t {
        background: #dddddd;
    }

    .t2_bar-green_t {
        background: #47B147;
        z-index: 2;
    }

    .t2_month-name_t {
        margin-top: 12px;
        font-size: 14px;
        color: #555;
        text-align: center;
    }

    .t2_x-axis-title_t {
        width: calc(100% - 90px);
        margin-left: 90px;
        text-align: center;
        margin-top: 38px;
        color: #0F0F0F;
        font-family: AvantGardeMdITC;
        font-size: 14px;
        font-weight: 400;
    }

    /* =========================
TABLET
========================= */

    @media (max-width:768px) {

        .t2_chart-container_t {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* chart width for scroll */
        .t2_chart-layout_t {
            min-width: 720px;
        }

        /* legend aligned with chart width */
        .t2_legend_t {
            width: 720px;
            justify-content: flex-end;
            gap: 16px;
            margin-bottom: 12px;
        }

        .t2_legend-item_t {
            font-size: 13px;
        }

        .t2_chart-wrapper_t {
            height: 220px;
            padding-left: 20px;
            padding-right: 10px;
        }

        .t2_bars_t {
            left: 20px;
            right: 10px;
            height: 100%;
            gap: 10px;
        }

        .t2_bar-wrapper_t {
            height: 220px;
            /* max-width:26px; */
        }

        .t2_month-name_t {
            font-size: 12px;
            margin-top: 10px;
        }

        .t2_y-label_t {
            left: -52px;
            width: 40px;
            top: -8px;
        }

        .t2_y-axis-title_t {
            /* margin-right:20px; */
            padding-left: 0;
        }

        .t2_x-axis-title_t {
            margin-top: 40px;
        }

        .t2_chart-container_t {
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE & Edge */
        }

        .t2_chart-container_t::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari */
        }

        .t2_x-axis-title_t {
            width: 132%;
            margin-left: 72px;
        }
    }


    /* =========================
MOBILE
========================= */

    @media (max-width:480px) {

        .t2_body_wala_t {
            width: 100%;
            overflow: hidden;
        }

        .t2_x-axis-title_t {
            width: calc(210% - 90px);
            margin-left: 90px;
        }

        .t2_chart-container_t {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* fixed width for smooth horizontal scroll */
        .t2_chart-layout_t {
            min-width: 680px;
        }

        /* legend width same as chart */
        .t2_legend_t {
            width: 680px;
            justify-content: flex-end;
            gap: 14px;
            margin-bottom: 10px;
        }

        .t2_legend-item_t {
            font-size: 12px;
            gap: 6px;
        }

        .t2_dot_t {
            width: 7px;
            height: 7px;
        }

        .t2_chart-wrapper_t {
            height: 180px;
            padding-left: 18px;
            padding-right: 10px;
        }

        .t2_bars_t {
            left: 18px;
            right: 10px;
            height: 100%;
            gap: 8px;
        }

        .t2_bar-wrapper_t {
            height: 180px;
            /* max-width:22px; */
        }

        .t2_month_t {
            min-width: 22px;
        }

        .t2_month-name_t {
            font-size: 10px;
            margin-top: 8px;
        }

        .t2_grid-line_t {
            border-top: 1px solid #f0f0f0;
        }

        .t2_y-label_t {
            left: -42px;
            width: 40px;
            top: -8px;
        }

        .t2_y-axis-title_t {
            /* margin-right:20px; */
            padding-left: 0;
        }

        .t2_x-axis-title_t {
            margin-top: 34px;
        }

        .t2_chart-container_t {
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE & Edge */
        }

        .t2_chart-container_t::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari */
        }
    }
</style>

                                        const t2_barsContainer =

                                        const t2_maxValue = 8000;
                                
                                        const t2_maxBarHeight = 168;
                                
                                        t2_chartData.forEach(item => {
                                
                                            const grayHeight =

                                                (item.saved / t2_maxValue) * t2_maxBarHeight;
                                
                                            const monthDiv = document.createElement("div");
                                
                                            monthDiv.classList.add("t2_month_t");
                                
                                            monthDiv.innerHTML = `
                                        
                                            <div class="t2_bar-wrapper_t">
                                        
                                              <div
                                                class="t2_bar-gray_t"
                                                style="height:${grayHeight}px;"
                                              ></div>
                                        
                                              <div
                                                class="t2_bar-green_t"
                                                style="height:${greenHeight}px;"
                                              ></div>
                                        
                                            </div>
                                        
                                            <div class="t2_month-name_t">
                                              ${item.month}
                                            </div>
                                          `;
                                
                                            t2_barsContainer.appendChild(monthDiv);
                                
                                        });
                                    </script>
